<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menstrudel | {{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="{{ "/assets/css/base.css" | relative_url }}">

<body>
