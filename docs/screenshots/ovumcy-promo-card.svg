  <text x="460" y="282" fill="#4A3D6A" fill-opacity="0.84" font-family="Quicksand, Nunito, Avenir Next, Segoe UI, sans-serif" font-size="40" font-weight="500">Privacy-first, self-hosted cycle tracking</text>
