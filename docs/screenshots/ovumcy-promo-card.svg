<svg width="1400" height="560" viewBox="0 0 1400 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ovumcyPromoTitle ovumcyPromoDesc">
  <title id="ovumcyPromoTitle">Ovumcy promo card</title>
