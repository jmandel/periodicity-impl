  <text x="550" y="446" fill="#4A3D6A" font-family="Quicksand, Nunito, Avenir Next, Segoe UI, sans-serif" font-size="24" font-weight="700" text-anchor="middle" dominant-baseline="middle">Self-hosted</text>

